<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - Products</title>
    <link rel="stylesheet" th:href="@{/css/theme.css}">
</head>
<body class="page-body">
<div class="page-shell">
    <div th:replace="~{fragments/navbar :: appNav('admin-products')}"></div>

    <main>
        <div class="page-header">
            <div class="page-title">
                <h1>All products</h1>
                <p>Inspect listing ownership, inventory levels, pricing, and visibility state.</p>
            </div>
            <div class="toolbar">
                <a class="btn btn-secondary" th:href="@{/admin}">Dashboard</a>
                <a class="btn btn-primary" th:href="@{/admin/orders}">Orders</a>
            </div>
        </div>

        <section class="section-card">
            <div class="notice" th:if="${param.deleted}">Product removed.</div>
            <div class="error-box" th:if="${param.failed}">Unable to delete product (possibly due to existing order history).</div>
            <div class="table-wrap">
                <table class="data-table">
                    <thead>
                    <tr>
                        <th>ID</th>
                        <th>Name</th>
                        <th>Seller</th>
                        <th>Price</th>
                        <th>Stock</th>
                        <th>Status</th>
                        <th>Created</th>
                        <th>Action</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:if="${#lists.isEmpty(products)}">
                        <td colspan="8">No products found.</td>
                    </tr>
                    <tr th:each="product : ${products}">
                        <td th:text="${product.id}">1</td>
                        <td th:text="${product.name}">Product</td>
                        <td th:text="${product.sellerUsername}">seller</td>
                        <td th:text="${product.price}">0</td>
                        <td th:text="${product.stockQuantity}">0</td>
                        <td>
                            <span class="badge" th:classappend="${product.active} ? ' success' : ' muted'"
                                  th:text="${product.active ? 'Active' : 'Inactive'}">Active</span>
                        </td>
                        <td th:text="${product.createdAt != null ? #temporals.format(product.createdAt, 'dd MMM yyyy HH:mm') : '-'}">date</td>
                        <td>
                            <form th:action="@{/admin/products/{productId}/delete(productId=${product.id})}" method="post" class="logout-form">
                                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                                <button class="btn btn-danger" type="submit">Delete</button>
                            </form>
                        </td>
                    </tr>
                    </tbody>
                </table>
            </div>
        </section>
    </main>
</div>
</body>
</html>
