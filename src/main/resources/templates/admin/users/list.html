<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - Users</title>
    <link rel="stylesheet" th:href="@{/css/theme.css}">
</head>
<body class="page-body">
<div class="page-shell">
    <div th:replace="~{fragments/navbar :: appNav('admin-users')}"></div>

    <main>
        <div class="page-header">
            <div class="page-title">
                <h1>All users</h1>
                <p>Review accounts, role assignment, and whether each user is currently enabled.</p>
            </div>
            <div class="toolbar">
                <a class="btn btn-secondary" th:href="@{/admin}">Dashboard</a>
                <a class="btn btn-primary" th:href="@{/admin/products}">Products</a>
            </div>
        </div>

        <section class="section-card">
            <div class="notice" th:if="${param.updated}">User status updated.</div>
            <div class="error-box" th:if="${param.failed}">Unable to update user status.</div>
            <div class="table-wrap">
                <table class="data-table">
                    <thead>
                    <tr>
                        <th>ID</th>
                        <th>Username</th>
                        <th>Email</th>
                        <th>Status</th>
                        <th>Roles</th>
                        <th>Joined</th>
                        <th>Action</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:if="${#lists.isEmpty(users)}">
                        <td colspan="7">No users found.</td>
                    </tr>
                    <tr th:each="user : ${users}">
                        <td th:text="${user.id}">1</td>
                        <td th:text="${user.username}">username</td>
                        <td th:text="${user.email}">email</td>
                        <td>
                            <span class="badge" th:classappend="${user.enabled} ? ' success' : ' muted'"
                                  th:text="${user.enabled ? 'Enabled' : 'Disabled'}">Enabled</span>
                        </td>
                        <td th:text="${#strings.listJoin(user.roles, ', ')}">ROLE_BUYER</td>
                        <td th:text="${user.createdAt != null ? #temporals.format(user.createdAt, 'dd MMM yyyy HH:mm') : '-'}">date</td>
                        <td>
                            <form th:action="@{/admin/users/{userId}/status(userId=${user.id})}" method="post" class="logout-form">
                                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                                <input type="hidden" name="enabled" th:value="${!user.enabled}">
                                <button class="btn btn-secondary" type="submit"
                                        th:text="${user.enabled ? 'Disable' : 'Enable'}">Disable</button>
                            </form>
                        </td>
                    </tr>
                    </tbody>
                </table>
            </div>
        </section>
    </main>
</div>
</body>
</html>
