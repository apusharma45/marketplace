<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Marketplace</title>
    <link rel="stylesheet" th:href="@{/css/theme.css}">
</head>
<body class="page-body">
<div class="page-shell">
    <div th:replace="~{fragments/navbar :: appNav('login')}"></div>

    <main class="auth-shell">
        <section class="auth-card">
            <span class="eyebrow">Welcome back</span>
            <h1>Login to your marketplace workspace</h1>
            <p>Use your username or email to continue to your buyer, seller, or admin dashboard.</p>

            <div class="notice" th:if="${param.registered}">Registration successful. Please login.</div>
            <div class="notice" th:if="${param.logout}">Logged out successfully.</div>
            <div class="error" th:if="${param.error}">Invalid username/email or password.</div>

            <form th:action="@{/login}" method="post">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">

                <div class="form-grid">
                    <div class="field full">
                        <label for="username">Username or Email</label>
                        <input id="username" type="text" name="username" maxlength="100" placeholder="Enter your username or email" required>
                    </div>

                    <div class="field full">
                        <label for="password">Password</label>
                        <input id="password" type="password" name="password" maxlength="255" placeholder="Enter your password" required>
                    </div>
                </div>

                <div class="form-actions">
                    <button type="submit" class="btn btn-primary">Login</button>
                    <a class="btn btn-secondary" th:href="@{/register}">Create account</a>
                </div>
            </form>
        </section>
    </main>
</div>
</body>
</html>
