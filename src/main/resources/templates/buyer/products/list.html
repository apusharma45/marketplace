<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Browse Products</title>
    <link rel="stylesheet" th:href="@{/css/theme.css}">
</head>
<body class="page-body">
<div class="page-shell">
    <div th:replace="~{fragments/navbar :: appNav('buyer-products')}"></div>

    <main>
        <div class="page-header">
            <div class="page-title">
                <h1>Available products</h1>
                <p>Browse active listings from sellers across the marketplace.</p>
            </div>
            <div class="toolbar">
                <a class="btn btn-secondary" th:href="@{/buyer}">Dashboard</a>
                <a class="btn btn-primary" th:href="@{/buyer/orders}">My orders</a>
            </div>
        </div>

        <div class="empty-state" th:if="${#lists.isEmpty(products)}">No products are available right now.</div>

        <section class="products-grid" th:if="${!#lists.isEmpty(products)}">
            <article class="product-card" th:each="product : ${products}">
                <div class="badge-row">
                    <span class="badge alt" th:text="|Seller: ${product.sellerUsername}|">Seller</span>
                    <span class="badge warning" th:text="|Stock: ${product.stockQuantity}|">Stock</span>
                </div>
                <h3 th:text="${product.name}">Product</h3>
                <p th:text="${product.description != null and !product.description.isBlank() ? product.description : 'No description provided.'}">Description</p>
                <strong class="price-tag" th:text="${product.price}">0</strong>
                <div class="hero-actions">
                    <a class="btn btn-primary" th:href="@{/buyer/products/{id}(id=${product.id})}">View details</a>
                </div>
            </article>
        </section>
    </main>
</div>
</body>
</html>
